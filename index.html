<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="ctrl.ico" type="image/x-icon" />
</head>
<body>
    <header id="header">
        <h1>Welcome to Rock , Paper, Scissors!</h1>
    </header>
    <div class="big-div">
        <button id="button1" class="btn" value="rock"><img src="rockimg.png" alt="" class="img"></button>
        <button id="button2" class="btn" value="paper"><img src="paperimg.png" alt="" class="img"></button>
        <button id="button3" class="btn" value="scissor"><img src="scissorimg.png" alt="" class="img"></button>
    </div>


    <div id="score">
        <h1>SCORE</h1>
        <div class="scorebox">
            <p id="my-score">YOUR SCORE :</p>
            <P id="computer-score">COMPUTER SCORE : </P>
        </div>
        <h1 class="result-round">RESULT OF THIS ROUND </h1>
    </div>
    <script src="script2.js"></script>
</body>
</html>
